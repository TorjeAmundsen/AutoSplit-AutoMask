name: Validate build

on:
    pull_request:

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: windows-latest
                      rid: win-x64
                    - os: ubuntu-latest
                      rid: linux-x64
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: "10.0.x"

            - name: Install Linux AOT dependencies
              if: matrix.os == 'ubuntu-latest'
              run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

            - name: Publish (AOT)
              shell: bash
              run: |
                  dotnet publish AutoMask/AutoMask.csproj \
                    -c Release \
                    -r ${{ matrix.rid }} \
                    --self-contained true \
                    /p:PublishAot=true \
                    -o build/${{ matrix.rid }}
